name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Create .env file
        run: echo "DATABASE_URL=${{ vars.DATABASE_URL }}" > api/.env

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm i

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ vars.CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_API_URL: ${{ vars.API_URL }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy-to-pages:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-to-workers:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm i

      - name: Build types package
        run: npm run build:types

      - name: Set Cloudflare Worker Secrets
        working-directory: ./api
        run: echo "${{ secrets.CLERK_SECRET_KEY }}" | npx wrangler secret put CLERK_SECRET_KEY
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy API to Cloudflare Workers
        working-directory: ./api
        run: |
          # Use explicit variable list so envsubst does not replace $schema or other
          # JSON/JSONC tokens that are not deployment variables.
          envsubst '$D1_DATABASE_ID $D1_DATABASE_NAME $CF_WORKER_CUSTOM_URL $ALLOWED_ORIGIN $CLERK_PUBLISHABLE_KEY' < wrangler.jsonc > wrangler.resolved.jsonc
          # Apply any pending D1 migrations before deploying the worker
          npx wrangler d1 migrations apply "$D1_DATABASE_NAME" --remote --config wrangler.resolved.jsonc
          npx wrangler deploy --config wrangler.resolved.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          D1_DATABASE_ID: ${{ vars.D1_DATABASE_ID }}
          D1_DATABASE_NAME: ${{ vars.D1_DATABASE_NAME }}
          CF_WORKER_CUSTOM_URL: ${{ vars.CF_WORKER_CUSTOM_URL }}
          ALLOWED_ORIGIN: ${{ vars.ALLOWED_ORIGIN }}
          CLERK_PUBLISHABLE_KEY: ${{ vars.CLERK_PUBLISHABLE_KEY }}
